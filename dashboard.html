            align-items: center;

        }

            cursor: pointer;

<body>
    <script type="module" src="js/firebase.js"></script>

    <!-- Auth guard: redirect to login if not signed in -->
    <script>
    (function() {
        let _unreadListener = null;

        function waitForAuth(retries) {
            if (typeof firebase === 'undefined' || !firebase.auth) {
                if (retries > 0) setTimeout(() => waitForAuth(retries - 1), 100);
                return;
            }
            firebase.auth().onAuthStateChanged(function(user) {
                const floatingBtn = document.getElementById('floatingChatBtn');
                if (user) {
                    const nameEl = document.getElementById('userDisplayName');
                    if (nameEl) nameEl.textContent = user.displayName || user.email;
                    document.getElementById('userNav').style.display = 'flex';
                    document.getElementById('guestNav').style.display = 'none';
                    if (floatingBtn) floatingBtn.style.display = 'flex';

                    // Watch for unread admin replies across page loads
                    if (_unreadListener) _unreadListener();
                    _unreadListener = firebase.firestore()
                        .collection('liveChats')
                        .where('userId', '==', user.uid)
                        .onSnapshot((snap) => {
                            const widget = document.getElementById('chatWidget');
                            if (widget && widget.style.display !== 'none') return;
                            let hasUnread = false;
                            snap.forEach(doc => {
                                const data = doc.data();
                                if (data.lastSender === 'admin') {
                                    const lastTs     = data.lastTimestamp?.toMillis?.()     || 0;
                                    const lastOpened = data.userLastOpenedAt?.toMillis?.() || 0;
                                    if (lastTs > lastOpened) hasUnread = true;
                                }
                            });
                            const badge = document.getElementById('fcbUnreadBadge');
                            if (badge) badge.style.display = hasUnread ? 'flex' : 'none';
                        }, () => {});
                } else {
                    document.getElementById('userNav').style.display = 'none';
                    document.getElementById('guestNav').style.display = 'flex';
                    if (floatingBtn) floatingBtn.style.display = 'none';
                    if (_unreadListener) { _unreadListener(); _unreadListener = null; }
                }
            });
        }
        waitForAuth(20);
    })();

    function doLogout() {
        firebase.auth().signOut().then(() => {
            window.location.reload();
        });
    }
    </script>

    <script>

        const firebaseConfig = {

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);

        // Make Firebase services available
        const db = firebase.firestore();
        const storage = firebase.storage();
        const auth = firebase.auth();

        // Enable offline persistence — cached data loads instantly on repeat visits
        db.enablePersistence({ synchronizeTabs: true }).catch(() => {});
        
        // Fetch and display items from Firestore with real-time updates
        let unsubscribeSnapshot = null;
        
        async function fetchAndDisplayItems() {
            try {
                console.log('Starting to fetch items with real-time updates');
                // Get the items container
                const itemsContainer = document.getElementById('items-container');
                if (!itemsContainer) {
                    console.error('Items container not found');
                    return;
                }
                const categoryFilterSelect = document.getElementById('categoryFilter');
                const selectedCategory = categoryFilterSelect ? categoryFilterSelect.value : 'all';

                const itemsTitleEl = document.querySelector('.items-title');
                if (itemsTitleEl) {
                    itemsTitleEl.textContent = 'All Recently Found Items';
                }
                
                // Clear the container with loading message
                itemsContainer.innerHTML = '<div class="loading">Loading items...</div>';
                
                // Unsubscribe from previous listener if exists
                if (unsubscribeSnapshot) {
                    unsubscribeSnapshot();
                }
                
                // Listen for real-time updates from Firestore
                console.log('Setting up real-time listener for Firestore');
                unsubscribeSnapshot = db.collection('items')
                    .orderBy('date', 'desc')
                    .limit(60)
                    .onSnapshot((querySnapshot) => {
                    console.log('Real-time update received, document count:', querySnapshot.size);
                
                if (querySnapshot.empty) {
                    console.log('No items found in Firestore');
                    itemsContainer.innerHTML = '<div class="no-items">No items found in database</div>';
                    return;
                }
                
                // Start building HTML for all items at once (safer approach)
                let allItemsHTML = '';
                
                // Process each document and build HTML string
                querySnapshot.forEach(doc => {
                    const data = doc.data();
                    const id = doc.id;
                    
                    console.log('Processing item:', id);
                    
                    const itemStatus = data.status || 'active';
                    
                    // Skip items that are no longer available
                    if (itemStatus === 'claimed' || itemStatus === 'returned' || itemStatus === 'disposed') {
                        return;
                    }
                    
                    // Handle category filter (grouped)
                    if (selectedCategory !== 'all') {
                        const categoryGroups = {
                            'gadgets':         ['phone', 'laptop', 'gadgets'],
                            'bags-wallets':    ['wallet', 'bag', 'bags-wallets'],
                            'accessories':     ['keys', 'jewelry', 'accessories'],
                            'garments':        ['clothing', 'garments'],
                            'eyewear':         ['eyewear'],
                            'cosmetics':       ['cosmetics'],
                            'supplies':        ['supplies'],
                            'umbrella':        ['umbrella'],
                            'toys':            ['toys'],
                            'food-containers': ['food-containers'],
                            'cash-cards':      ['cash-cards'],
                            'documents':       ['documents'],
                            'other':           ['other']
                        };
                        const allowed = categoryGroups[selectedCategory] || [selectedCategory];
                        if (!allowed.includes((data.category || '').toLowerCase())) return;
                    }
                    
                    // Format date
                    const dateFound = data.date ? new Date(data.date) : null;
                    const formattedDate = dateFound ? dateFound.toLocaleDateString() : 'Unknown date';
                    
                    // Use the actual image URL from Firebase Storage or fallback to placeholder
                    let imageUrl = data.image || 'https://via.placeholder.com/300x200?text=No+Image';
                    
                    // Ensure we're not using a placeholder when we actually have an uploaded image
                    if (imageUrl.startsWith('https://via.placeholder.com') && data.image && data.image.trim() !== '') {
                        imageUrl = data.image;
                    }
                    
                    // Check if the image is a data URL (starts with data:image)
                    const isDataUrl = typeof imageUrl === 'string' && imageUrl.startsWith('data:image');
                    
                    // If it's a very long data URL, add special handling
                    if (isDataUrl) {
                        console.log(`Item ${id} uses a data URL for image`);
                    } else {
                        console.log(`Item ${id} uses an external URL for image:`, imageUrl);
                    }
                    
                    // Determine the item status and the corresponding badge style
                    let statusBadge = '';
                    
                    if (itemStatus === 'soon') {
                        statusBadge = `<div class="status-badge status-soon">Disposal Soon</div>`;
                    } else {
                        statusBadge = `<div class="status-badge status-active">Active</div>`;
                    }
                    
                    // Build HTML for this item
                    allItemsHTML += `
                        <div class="item-card" data-item-id="${id}" onclick="window.location.href='item-details.html?id=${id}'">
                            <div class="item-image">
                                <img src="${imageUrl}" alt="${data.title || 'Unknown item'}" onerror="this.src='https://via.placeholder.com/300x200?text=Image+Error'">
                                ${statusBadge}
                            </div>
                            <div class="item-content">
                                <h3 class="item-title">${data.title || 'Unnamed Item'}</h3>
                                <div class="item-category">${data.category || 'Uncategorized'}</div>
                                <div class="item-details">
                                    <div>📍 ${data.location || 'Unknown location'}</div>
                                    <div>📅 ${formattedDate}</div>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                // Update the container with all items at once
                itemsContainer.innerHTML = allItemsHTML;
                
                console.log(`Successfully loaded ${querySnapshot.size} items`);
                
                }, (error) => {
                    // Error callback for onSnapshot
                    console.error('Error in real-time listener:', error);
                    const itemsContainer = document.getElementById('items-container');
                    if (itemsContainer) {
                        itemsContainer.innerHTML = `<div class="error">Error loading items: ${error.message}</div>`;
                    }
                });
                
            } catch (error) {
                console.error('Error setting up real-time listener:', error);
                const itemsContainer = document.getElementById('items-container');
                if (itemsContainer) {
                    itemsContainer.innerHTML = `<div class="error">Error loading items: ${error.message}</div>`;
                }
            }
        }
        
        // View item details function (now used via onclick in HTML)
        function viewItemDetails(itemId) {
            console.log('Viewing item:', itemId);
            window.location.href = `item-details.html?id=${itemId}`;

        // Additional helper functions

        // Initialize once document is loaded
        document.addEventListener('DOMContentLoaded', () => {
            // Fetch and display items

        });

    <!-- Chat Inbox Panel Logic -->
    <script>
    (function() {
        let _inboxUnsub = null;
        let _inboxOpen  = true;
        const _imgCache = {};

        function _fmtTime(date) {
            if (!date) return '';
            const diff = Date.now() - date.getTime();
            const m = Math.floor(diff / 60000);
            if (m < 1)  return 'now';
            if (m < 60) return m + 'm';
            const h = Math.floor(m / 60);
            if (h < 24) return h + 'h';
            return Math.floor(h / 24) + 'd';
        }

        async function _getItemImg(itemId) {
            if (!itemId) return '';
            if (_imgCache[itemId] !== undefined) return _imgCache[itemId];
            try {
                const doc = await firebase.firestore().collection('items').doc(itemId).get();
                const url = (doc.exists && doc.data().image) ? doc.data().image : '';
                _imgCache[itemId] = url;
                return url;
            } catch(e) { return ''; }
        }

        function _render(snap) {
            const list  = document.getElementById('chatInboxList');
            const badge = document.getElementById('chatInboxHeaderBadge');
            if (!list) return;

            if (snap.empty) {
                list.innerHTML = '<div id="chatInboxEmpty">No item inquiries yet.</div>';
                if (badge) badge.style.display = 'none';
                return;
            }

            // Sort newest first (client-side to avoid composite index); skip user-hidden chats
            const docs = snap.docs
                .map(d => ({ id: d.id, ...d.data() }))
                .filter(d => !d.userHidden)
                .sort((a, b) => {
                    const ta = a.lastTimestamp?.toMillis?.() || a.startTime?.toMillis?.() || 0;
                    const tb = b.lastTimestamp?.toMillis?.() || b.startTime?.toMillis?.() || 0;
                    return tb - ta;
                });

            if (docs.length === 0) {
                list.innerHTML = '<div id="chatInboxEmpty">No item inquiries yet.</div>';
                if (badge) badge.style.display = 'none';
                return;
            }

            list.innerHTML = '';
            let unreadTotal = 0;

            // Render all rows synchronously first (instant) with ? placeholder thumbnails,
            // then fetch images in parallel and swap them in — no blocking loop.
            const thumbEls = [];

            for (const data of docs) {
                const itemId     = data.itemId    || null;
                const itemTitle  = data.itemTitle || 'Inquiry';
                const lastMsg    = data.lastMessage  || '';
                const lastSender = data.lastSender   || '';
                const lastTs     = data.lastTimestamp;
                const lastOpened = data.userLastOpenedAt;

                const lastTsMs   = lastTs?.toMillis?.()     || 0;
                const lastOpenMs = lastOpened?.toMillis?.() || 0;
                const isUnread   = lastSender === 'admin' && lastTsMs > lastOpenMs;
                if (isUnread) unreadTotal++;

                const timeStr = lastTs ? _fmtTime(lastTs.toDate ? lastTs.toDate() : new Date(lastTs.seconds * 1000)) : '';

                const row = document.createElement('div');
                row.className = 'cib-item';

                const thumbEl = document.createElement('div');
                thumbEl.className = 'cib-thumb';
                thumbEl.textContent = '?';

                const infoEl = document.createElement('div');
                infoEl.className = 'cib-info';
                infoEl.innerHTML = `
                    <div class="cib-title">${itemTitle}</div>
                    <div class="cib-last ${isUnread ? 'unread' : ''}">${
                        lastMsg
                            ? (lastSender === 'admin' ? 'Staff: ' : 'You: ') + lastMsg
                            : '<em>No messages yet</em>'
                    }</div>
                `;

                const rightEl = document.createElement('div');
                rightEl.className = 'cib-right';
                rightEl.innerHTML = `
                    <span class="cib-time">${timeStr}</span>
                    ${isUnread ? '<div class="cib-dot"></div>' : ''}
                `;

                // Delete button — hides chat from inbox; history is preserved and reappears on next chat
                const delBtn = document.createElement('button');
                delBtn.className = 'cib-del';
                delBtn.title = 'Remove from inbox (history preserved)';
                delBtn.textContent = '✕';
                const _chatDocId = data.id;
                delBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    firebase.firestore().collection('liveChats').doc(_chatDocId).update({
                        userHidden: true
                    }).catch(() => {});
                });
                rightEl.appendChild(delBtn);

                row.appendChild(thumbEl);
                row.appendChild(infoEl);
                row.appendChild(rightEl);

                row.addEventListener('click', () => {
                    if (typeof window.openUserChat === 'function') {
                        window.openUserChat(itemId || '', itemTitle);
                    } else if (typeof window.toggleChatWidget === 'function') {
                        window.toggleChatWidget();
                    }
                });

                list.appendChild(row);
                thumbEls.push({ thumbEl, itemId, itemTitle });
            }

            // Update header badge immediately
            if (badge) {
                badge.textContent = unreadTotal || '';
                badge.style.display = unreadTotal ? 'flex' : 'none';
            }

            // Fetch all images in parallel — updates thumbnails as they arrive
            thumbEls.forEach(({ thumbEl, itemId, itemTitle }) => {
                if (!itemId) return;
                _getItemImg(itemId).then(imgUrl => {
                    if (!imgUrl || !thumbEl.isConnected) return;
                    const img = document.createElement('img');
                    img.src = imgUrl;
                    img.alt = itemTitle;
                    img.onerror = () => { thumbEl.textContent = '?'; };
                    thumbEl.innerHTML = '';
                    thumbEl.appendChild(img);
                });
            });
        }

        function _initInbox(uid) {
            const panel  = document.getElementById('userChatInbox');
            const header = document.getElementById('chatInboxHeader');
            const body   = document.getElementById('chatInboxBody');
            const toggleBtn = document.getElementById('chatInboxToggleBtn');
            if (!panel) return;

            panel.style.display = 'flex';

            // Toggle collapse
            header.addEventListener('click', () => {
                _inboxOpen = !_inboxOpen;
                body.style.display    = _inboxOpen ? 'block' : 'none';
                toggleBtn.textContent = _inboxOpen ? '▼' : '▲';
            });

            // Real-time listener
            if (_inboxUnsub) _inboxUnsub();
            _inboxUnsub = firebase.firestore()
                .collection('liveChats')
                .where('userId', '==', uid)
                .onSnapshot(_render, () => {});
        }

        function _destroyInbox() {
            if (_inboxUnsub) { _inboxUnsub(); _inboxUnsub = null; }
            const panel = document.getElementById('userChatInbox');
            if (panel) panel.style.display = 'none';
            const list = document.getElementById('chatInboxList');
            if (list) list.innerHTML = '';
        }

        // Hook into auth state — wait for firebase to be ready
        function _waitAndBind(retries) {
            if (typeof firebase === 'undefined' || !firebase.auth) {
                if (retries > 0) setTimeout(() => _waitAndBind(retries - 1), 150);
                return;
            }
            firebase.auth().onAuthStateChanged(user => {
                if (user) _initInbox(user.uid);
                else _destroyInbox();
            });
        }
        _waitAndBind(30);
    })();
    </script>
